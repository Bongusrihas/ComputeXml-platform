
services:
  mongodb:
    image: mongo:7
    container_name: computex_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: computex_backend
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/computex_ml
      - JWT_SECRET=${JWT_SECRET}
      - PYTHON_SERVICE_URL=http://python_service:8000
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=100
    depends_on:
      - mongodb
      - python_service
    volumes:
      - ./backend/output:/app/output
    expose:
      - "4000"

  frontend:
    build: ./frontend
    container_name: computex_frontend
    expose:
      - "5173"

  python_service:
    build: ./python_service
    container_name: computex_python
    environment:
      - CPLUS_ENGINE_PATH=/tmp/cpp_build/engine
    volumes:
      - ./cpp_engine:/app/cpp_engine
      - ./backend/output:/app/input_output
      - ./python_service/artifacts:/app/artifacts
    expose:
      - "8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: computex_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: computex_grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  nginx:
    image: nginx:latest
    container_name: computex_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - python_service

volumes:
  mongo_data:
